# Next.js no Netlify: o build é detectado automaticamente e o plugin oficial
# (@netlify/plugin-nextjs) cuida do roteamento/serving. Não definimos "publish"
# manualmente (isso quebra o roteamento do Next). Variáveis NEXT_PUBLIC_SUPABASE_*
# são configuradas por site no painel do Netlify.
[build]
  command = "next build"

[build.environment]
  NODE_VERSION = "22"
