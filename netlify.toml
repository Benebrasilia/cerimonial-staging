# Configuração canônica de Next.js no Netlify.
# - publish ".next": saída do build (o plugin transforma em funções + estáticos)
# - plugin oficial declarado explicitamente (o site foi criado como import estático)
# NEXT_PUBLIC_SUPABASE_* ficam por site no painel (staging x produção).
[build]
  command = "next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
